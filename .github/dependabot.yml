# .github/dependabot.yml
version: 2
updates:
  - package-ecosystem: "npm"        # Dependabot uses "npm" for pnpm workspaces too
    directory: "/"                  # single root pnpm-lock.yaml covers all apps/* + packages/*
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Riyadh"
    open-pull-requests-limit: 10
    # Group the routine churn into fewer PRs; security/major bumps still come separately.
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "deps"
      include: "scope"
