<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img" aria-label="Daughter illustration">
  <!-- Body / lavender shirt -->
  <path d="M 100 800 Q 100 560 220 490 L 380 490 Q 500 560 500 800 Z" fill="#C8A3E5"/>
  <!-- Shirt highlight -->
  <path d="M 110 800 Q 110 575 220 510 L 240 510 Q 150 575 150 800 Z" fill="#D9B0FC" opacity="0.7"/>
  <!-- Shirt collar -->
  <path d="M 275 490 L 300 515 L 325 490" stroke="#9B7AC1" stroke-width="3" fill="none"/>

  <!-- Long hair (flowing behind, visible on both sides + below shoulders) -->
  <path d="M 145 800 Q 130 540 175 380 Q 195 245 300 235 Q 405 245 425 380 Q 470 540 455 800 Z" fill="#5C3A28"/>

  <!-- Hair side strands flowing forward -->
  <path d="M 165 380 Q 170 480, 180 580" stroke="#3D2418" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 435 380 Q 430 480, 420 580" stroke="#3D2418" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Pink ribbon detail on the side -->
  <path d="M 200 240 Q 215 220, 230 235 Q 225 250, 210 245 Z" fill="#F2BB16"/>
  <path d="M 200 240 Q 195 250, 200 260 Q 215 260, 215 250" fill="#E89B5A"/>

  <!-- Ears (peeking out) -->
  <ellipse cx="178" cy="305" rx="11" ry="17" fill="#D9A87C"/>
  <ellipse cx="422" cy="305" rx="11" ry="17" fill="#D9A87C"/>

  <!-- Neck -->
  <rect x="272" y="415" width="56" height="80" fill="#EDC9A8"/>

  <!-- Head (smaller for child) -->
  <ellipse cx="300" cy="305" rx="122" ry="125" fill="#EDC9A8"/>

  <!-- Hair front fringe (slightly tousled) -->
  <path d="M 182 260 Q 215 170, 300 165 Q 385 170, 418 260 Q 395 220, 360 215 Q 320 205, 300 230 Q 280 205, 240 215 Q 205 220, 182 260 Z" fill="#5C3A28"/>
  <!-- Hair texture wisps -->
  <path d="M 230 220 Q 240 200, 250 215" stroke="#3D2418" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 350 220 Q 360 200, 370 215" stroke="#3D2418" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Eyebrows: thinner, child-like -->
  <path d="M 240 268 Q 257 263, 275 268" stroke="#3D2418" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 325 268 Q 343 263, 360 268" stroke="#3D2418" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Big expressive eyes (kid proportions) -->
  <ellipse cx="258" cy="315" rx="13" ry="11" fill="white"/>
  <ellipse cx="342" cy="315" rx="13" ry="11" fill="white"/>
  <circle cx="258" cy="315" r="8" fill="#1A0F08"/>
  <circle cx="342" cy="315" r="8" fill="#1A0F08"/>
  <!-- Big eye highlights -->
  <circle cx="261" cy="312" r="3" fill="white"/>
  <circle cx="345" cy="312" r="3" fill="white"/>
  <!-- Lower lash hint -->
  <path d="M 248 327 Q 258 332, 268 327" stroke="#3D2418" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 332 327 Q 342 332, 352 327" stroke="#3D2418" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Strong cheek blush (child-like rosy cheeks) -->
  <circle cx="232" cy="360" r="18" fill="#F4A8B5" opacity="0.55"/>
  <circle cx="368" cy="360" r="18" fill="#F4A8B5" opacity="0.55"/>

  <!-- Small nose -->
  <path d="M 296 340 Q 295 358, 300 365 Q 305 365, 305 358 Q 304 340 304 340" stroke="#D9A87C" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Wide kid smile -->
  <path d="M 258 380 Q 300 408, 342 380" stroke="#1A0F08" stroke-width="3.5" fill="none" stroke-linecap="round"/>
</svg>
