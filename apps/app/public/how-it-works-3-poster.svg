<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Chat and progress tracking mockup">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2BB16" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#E89B5A" stop-opacity="0.18"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg3)"/>

  <!-- Chat header -->
  <rect x="100" y="50" width="380" height="20" rx="6" fill="#1A1023" opacity="0.65"/>
  <rect x="100" y="78" width="220" height="12" rx="3" fill="#1A1023" opacity="0.3"/>

  <!-- Incoming message (assistant — left in LTR) -->
  <path d="M 100 130 L 100 150 Q 100 160 110 160 L 380 160 Q 390 160 390 170 L 390 210 Q 390 220 380 220 L 110 220 Q 100 220 100 210 Z" fill="white" stroke="#1A1023" stroke-opacity="0.1"/>
  <rect x="120" y="148" width="240" height="11" rx="3" fill="#1A1023" opacity="0.55"/>
  <rect x="120" y="166" width="190" height="11" rx="3" fill="#1A1023" opacity="0.45"/>
  <rect x="120" y="184" width="160" height="11" rx="3" fill="#1A1023" opacity="0.45"/>

  <!-- Outgoing message (user — right) — yellow bubble -->
  <rect x="320" y="240" width="380" height="60" rx="16" fill="#F2BB16"/>
  <rect x="340" y="258" width="280" height="11" rx="3" fill="#4E2490" opacity="0.85"/>
  <rect x="340" y="276" width="220" height="11" rx="3" fill="#4E2490" opacity="0.7"/>

  <!-- Assistant response -->
  <path d="M 100 320 L 100 340 Q 100 350 110 350 L 410 350 Q 420 350 420 360 L 420 400 Q 420 410 410 410 L 110 410 Q 100 410 100 400 Z" fill="white" stroke="#1A1023" stroke-opacity="0.1"/>
  <rect x="120" y="338" width="270" height="11" rx="3" fill="#1A1023" opacity="0.55"/>
  <rect x="120" y="356" width="220" height="11" rx="3" fill="#1A1023" opacity="0.45"/>
  <rect x="120" y="374" width="180" height="11" rx="3" fill="#1A1023" opacity="0.45"/>

  <!-- Progress card (bottom) — chart -->
  <rect x="100" y="440" width="600" height="120" rx="16" fill="white" stroke="#1A1023" stroke-opacity="0.08"/>
  <rect x="120" y="460" width="150" height="12" rx="3" fill="#4E2490" opacity="0.6"/>
  <rect x="120" y="478" width="110" height="9" rx="3" fill="#1A1023" opacity="0.3"/>
  <!-- Chart line -->
  <polyline
    points="120,540 200,520 280,505 360,510 440,488 520,478 600,460 680,455"
    fill="none"
    stroke="#F2BB16"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Chart dots -->
  <circle cx="120" cy="540" r="4" fill="#F2BB16"/>
  <circle cx="280" cy="505" r="4" fill="#F2BB16"/>
  <circle cx="440" cy="488" r="4" fill="#F2BB16"/>
  <circle cx="680" cy="455" r="5" fill="#4E2490"/>
  <!-- Value badge above last dot -->
  <rect x="640" y="430" width="80" height="22" rx="11" fill="#4E2490"/>
  <text x="680" y="445" text-anchor="middle" font-family="Tajawal, system-ui, sans-serif" font-size="11" font-weight="700" fill="white">-7kg</text>
</svg>
