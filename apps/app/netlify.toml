# Netlify config for the Fit Life SaaS app
# Live at: https://fitlife-app-mvp.netlify.app/
# Custom domain (e.g., app.fitlife.com) to be added later.
#
# IMPORTANT: This site is configured with:
#   Base directory: apps/app (set in Netlify UI)
#   Package directory: (auto-filled to "apps/app/" — cannot be cleared in UI)
#   Publish directory: .next (relative to base)
#
# Because Netlify's Package directory UI field is locked and adds a redundant
# apps/app/ prefix, we use explicit paths and pnpm filter in the build command
# below to ensure consistent behavior regardless of where Netlify thinks it is.

[build]
  base = "apps/app"
  command = "cd $NETLIFY_REPO_BASE_DIR && corepack enable && pnpm install --no-frozen-lockfile && pnpm --filter @fitlife/app build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PRIVATE_TARGET = "server"
  # Critical: NETLIFY_REPO_BASE_DIR is the monorepo root regardless of base setting
  # This lets us reliably "cd" back to where pnpm-workspace.yaml lives.

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Security headers (matches next.config.ts but Netlify applies these at edge)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Robots-Tag = "noindex, nofollow"

# Cache static assets aggressively
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/image*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# API routes must not be cached
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
