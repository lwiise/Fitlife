# Netlify config for the Fit Life SaaS app
# Live at: https://fitlife-app-mvp.netlify.app/
# Custom domain (e.g., app.fitlife.com) to be added later.
#
# Build approach:
#   - base = "apps/app" so Netlify scopes the deploy to this app
#   - pnpm -w install installs at the workspace root regardless of cwd
#     (pnpm -w looks UP for pnpm-workspace.yaml)
#   - pnpm --filter @fitlife/app build builds only this app's package
#
# This avoids relying on $NETLIFY_REPO_BASE_DIR (which doesn't exist
# in Netlify's build environment).

[build]
  base = "apps/app"
  command = "corepack enable && pnpm -w install --no-frozen-lockfile && pnpm --filter @fitlife/app build"
  # publish is relative to base — Netlify joins them, so ".next" resolves
  # to /opt/build/repo/apps/app/.next. Using "apps/app/.next" here would
  # double the prefix (see deploy 2496820 — failed at apps/app/apps/app/.next).
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PRIVATE_TARGET = "server"

# Custom Netlify functions (e.g. the plan-generation background worker) are
# bundled with esbuild, which inlines the relatively-imported @fitlife/plan-engine
# source into the artifact (avoids pnpm workspace-symlink resolution issues).
[functions]
  node_bundler = "esbuild"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Robots-Tag = "noindex, nofollow"

# Cache static assets aggressively
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/image*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# API routes must not be cached
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
