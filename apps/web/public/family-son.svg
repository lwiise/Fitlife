<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img" aria-label="Son illustration">
  <!-- Body / yellow t-shirt -->
  <path d="M 100 800 Q 100 560 220 490 L 380 490 Q 500 560 500 800 Z" fill="#F2BB16"/>
  <!-- Shirt highlight -->
  <path d="M 110 800 Q 110 575 220 510 L 240 510 Q 150 575 150 800 Z" fill="#FFD63D" opacity="0.7"/>
  <!-- T-shirt collar (round neckline) -->
  <path d="M 268 490 Q 300 510, 332 490" stroke="#D9A60E" stroke-width="3.5" fill="none"/>
  <!-- Small graphic on shirt -->
  <circle cx="300" cy="600" r="20" fill="#E89B5A" opacity="0.7"/>
  <path d="M 290 600 L 297 607 L 312 592" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Ears -->
  <ellipse cx="178" cy="305" rx="13" ry="19" fill="#D9A87C"/>
  <ellipse cx="422" cy="305" rx="13" ry="19" fill="#D9A87C"/>

  <!-- Neck -->
  <rect x="272" y="415" width="56" height="80" fill="#E5B98E"/>

  <!-- Head (kid proportions) -->
  <ellipse cx="300" cy="305" rx="122" ry="125" fill="#E5B98E"/>

  <!-- Hair: short, slightly messy, tousled -->
  <path d="M 180 255 Q 195 165, 300 155 Q 405 165, 420 255 Q 395 215, 360 210 Q 335 200, 320 220 Q 300 200, 280 220 Q 265 200, 240 210 Q 205 215, 180 255 Z" fill="#2A1810"/>
  <!-- Messy hair tufts on top -->
  <path d="M 250 170 Q 255 145, 270 160" stroke="#1A0F08" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 320 165 Q 335 140, 345 165" stroke="#1A0F08" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Side hair -->
  <ellipse cx="195" cy="290" rx="18" ry="32" fill="#2A1810"/>
  <ellipse cx="405" cy="290" rx="18" ry="32" fill="#2A1810"/>

  <!-- Eyebrows: bolder, playful angle -->
  <path d="M 240 268 Q 258 261, 278 268" stroke="#1A0F08" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 322 268 Q 342 261, 360 268" stroke="#1A0F08" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Eyes (big kid eyes) -->
  <ellipse cx="258" cy="315" rx="12" ry="11" fill="white"/>
  <ellipse cx="342" cy="315" rx="12" ry="11" fill="white"/>
  <circle cx="258" cy="315" r="7.5" fill="#1A0F08"/>
  <circle cx="342" cy="315" r="7.5" fill="#1A0F08"/>
  <!-- Eye highlights -->
  <circle cx="261" cy="312" r="2.8" fill="white"/>
  <circle cx="345" cy="312" r="2.8" fill="white"/>

  <!-- Subtle cheek blush -->
  <circle cx="232" cy="360" r="16" fill="#F4A8B5" opacity="0.45"/>
  <circle cx="368" cy="360" r="16" fill="#F4A8B5" opacity="0.45"/>

  <!-- Small nose -->
  <path d="M 296 340 Q 295 358, 300 365 Q 305 365, 305 358 Q 304 340 304 340" stroke="#C09467" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Big mischievous-friendly smile -->
  <path d="M 254 378 Q 300 412, 346 378" stroke="#1A0F08" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Hint of tooth/dimple corners -->
  <path d="M 254 378 L 260 383" stroke="#1A0F08" stroke-width="2" stroke-linecap="round"/>
  <path d="M 346 378 L 340 383" stroke="#1A0F08" stroke-width="2" stroke-linecap="round"/>
</svg>
